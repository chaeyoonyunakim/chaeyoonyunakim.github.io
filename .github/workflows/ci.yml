name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Check output exists
        run: test -f _site/index.html

      - name: Check project thumbnails
        run: |
          failed=0
          for file in _projects/*.md; do
            thumb=$(grep '^thumb:' "$file" | sed 's/^thumb:[[:space:]]*"\(.*\)"/\1/')
            [ -z "$thumb" ] && continue
            if [[ "$thumb" == http* ]]; then
              echo "Checking external: $thumb"
              if ! curl --silent --fail --location --head --max-time 15 "$thumb"; then
                echo "FAIL: unreachable — $thumb"
                failed=1
              fi
            else
              path="_site${thumb}"
              echo "Checking local: $path"
              if [ ! -f "$path" ]; then
                echo "FAIL: not found in _site — $path"
                failed=1
              fi
            fi
          done
          exit $failed
