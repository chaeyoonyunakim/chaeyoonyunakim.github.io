<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title | default: "Chaeyoon Kim" }}</title>
  <meta name="description" content="{{ page.description | default: site.description | default: 'Data Scientist at NHS England' }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f4;
      --text: #111111;
      --muted: #777777;
      --accent: #c9856a;
      --border: #e4d8d2;
      --card-bg: #ffffff;
      --max-w: 860px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      border-left: 4px solid var(--accent);
      border-right: 4px solid var(--accent);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo {
      font-weight: 900;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* MAIN */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* SECTIONS */
    .section {
      border-top: 1px solid var(--border);
      padding: 5rem 0;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .display-heading {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .section-heading {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .body-text {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 520px;
    }

    /* TWO-COL */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    /* META GRID */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .meta-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .meta-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    /* CV */
    .cv-summary {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 640px;
      margin-bottom: 3rem;
    }
    .cv-block { margin-top: 2.5rem; }
    .cv-block-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .cv-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .cv-item {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 1.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .cv-item:last-child { border-bottom: none; padding-bottom: 0; }
    .cv-item-period {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 0.25rem;
    }
    .cv-item-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .cv-item-org {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      margin-top: 0.15rem;
      margin-bottom: 0.85rem;
    }
    .cv-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .cv-bullets li {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      padding-left: 1rem;
      position: relative;
    }
    .cv-bullets li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    .cv-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1.5rem;
    }
    .cv-tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.75rem;
    }

    /* POSTS GRID */
    .posts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 2.5rem;
    }

    .post-card {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .post-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(201, 133, 106, 0.12);
    }
    .post-meta {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .post-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .post-excerpt {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .post-arrow {
      margin-top: auto;
      font-size: 1rem;
      color: var(--accent);
    }

    /* BUTTONS */
    .btn-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }
    .btn-primary:hover { background: var(--accent); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--text); }

    /* POST PAGE */
    .post-container {
      padding: 4rem 0;
      max-width: 640px;
    }
    .post-page-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.75rem;
    }
    .post-page-meta {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .redirect-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .post-body {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text);
    }
    .post-body p { margin-bottom: 1.25rem; }
    .post-body h2 { font-size: 1.4rem; font-weight: 700; margin: 2rem 0 0.75rem; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 2rem;
    }
    .footer-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .footer-links {
      display: flex;
      gap: 1.5rem;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 640px) {
      body { border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); }
      .two-col { grid-template-columns: 1fr; gap: 2rem; }
      .posts-grid { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr 1fr; }
      .cv-item { grid-template-columns: 1fr; gap: 0.5rem; }
      nav { padding: 0 1rem; }
      main { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">CK.</a>
      <ul class="nav-links">
        <li><a href="/#about">About</a></li>
        <li><a href="/#cv">CV</a></li>
        <li><a href="/#writing">Writing</a></li>
        <li><a href="https://www.linkedin.com/in/chaeyoonyunakim" target="_blank">LinkedIn</a></li>
      </ul>
    </div>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    <div class="footer-inner">
      <span class="footer-copy">&copy; {{ site.time | date: "%Y" }} Chaeyoon Kim</span>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/chaeyoonyunakim" target="_blank">LinkedIn</a>
        <a href="https://github.com/chaeyoonyunakim" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>
</body>
</html>
