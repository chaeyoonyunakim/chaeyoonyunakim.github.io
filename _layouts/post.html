---
layout: default
---
{% if page.redirect_to %}
<meta http-equiv="refresh" content="0; url={{ page.redirect_to }}">
<script>window.location.href = "{{ page.redirect_to }}";</script>
{% endif %}
<div class="post-container">
  <p class="section-label"><a href="/#writing" style="color:inherit;text-decoration:none;">← Writing</a></p>
  <h1 class="post-page-title">{{ page.title }}</h1>
  <p class="post-page-meta">{{ page.date | date: "%B %d, %Y" }}</p>
  {% if page.redirect_to %}
  <div class="redirect-card">
    <p class="body-text">This article is published on LinkedIn Pulse.</p>
    <a class="btn btn-primary" href="{{ page.redirect_to }}" target="_blank">Read on LinkedIn ↗</a>
  </div>
  {% else %}
  <div class="post-body">{{ content }}</div>
  {% endif %}
</div>
